<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Menu Planner - Arpit &amp; Family</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-row">
        <div class="header-left">
          <h1 class="app-title">Wedding Menu Planner</h1>
          <span class="app-subtitle"
            >Taj Gateway Nashik &middot; 23 Apr 2026</span
          >
        </div>
        <nav class="main-nav">
          <button class="nav-tab active" data-view="browser" title="Press 1">
            Browser
          </button>
          <button class="nav-tab" data-view="planner" title="Press 2">
            Planner
          </button>
          <button class="nav-tab" data-view="menu" title="Press 3">Menu</button>
        </nav>
        <div class="header-right">
          <button class="menu-trigger" id="menu-trigger">
            <span class="menu-trigger-name" id="menu-trigger-name"
              >My Menu</span
            >
            <span class="menu-trigger-chevron">&#9662;</span>
          </button>
          <button class="menu-bar-btn" id="btn-save-as">Save As</button>
          <button class="menu-bar-btn" id="btn-export">Export</button>
          <label class="menu-bar-btn menu-bar-btn-label" id="btn-import-label">
            Import
            <input
              type="file"
              id="btn-import"
              accept=".json"
              style="display: none"
            />
          </label>
        </div>
      </div>
      <div class="menu-dropdown-overlay" id="menu-dropdown-overlay"></div>
      <div class="menu-dropdown" id="menu-dropdown">
        <div class="menu-dropdown-header">
          <span>Saved Menus</span>
          <button class="menu-bar-btn" id="btn-new-menu">+ New Menu</button>
        </div>
        <div class="menu-dropdown-list" id="menu-dropdown-list"></div>
      </div>
    </header>

    <!-- VIEW 1: DISH BROWSER -->
    <main id="view-browser" class="view active">
      <div class="browser-layout">
        <div class="filter-bar" id="filter-bar">
          <div class="filter-bar-top">
            <div class="search-wrapper">
              <input
                type="text"
                id="search-input"
                placeholder="Search dishes... ( / )"
                autocomplete="off"
              />
              <span class="search-hint">/</span>
            </div>
            <div class="filter-bar-stats" id="browser-stats"></div>
            <button class="btn-clear-filters" id="btn-clear-filters">
              Clear All
            </button>
          </div>
          <div class="filter-bar-groups">
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="source">
                Source
              </button>
              <div class="filter-group-chips hidden" id="filter-source"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="category">
                Category
              </button>
              <div class="filter-group-chips hidden" id="filter-category"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="cuisine">
                Cuisine
              </button>
              <div class="filter-group-chips hidden" id="filter-cuisine"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="cultural">
                Cultural
              </button>
              <div class="filter-group-chips hidden" id="filter-cultural"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="spice">
                Spice
              </button>
              <div class="filter-group-chips hidden" id="filter-spice"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="richness">
                Richness
              </button>
              <div class="filter-group-chips hidden" id="filter-richness"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="crowd">
                Crowd
              </button>
              <div class="filter-group-chips hidden" id="filter-crowd"></div>
            </div>
            <div class="filter-group-inline">
              <button class="filter-group-label" data-toggle="method">
                Method
              </button>
              <div class="filter-group-chips hidden" id="filter-method"></div>
            </div>
          </div>
          <div class="filter-chips-row" id="filter-chips-row"></div>
        </div>
        <div class="dish-grid" id="dish-grid"></div>
      </div>
    </main>

    <!-- VIEW 2: EVENT PLANNER -->
    <main id="view-planner" class="view">
      <div class="planner-layout">
        <aside class="planner-sidebar" id="planner-sidebar"></aside>
        <div class="planner-main">
          <div class="planner-event-header" id="event-header"></div>
          <div class="planner-categories" id="event-dishes"></div>
          <div class="planner-event-notes">
            <label for="event-notes">Event Notes</label>
            <textarea
              id="event-notes"
              placeholder="Notes for chef discussion..."
            ></textarea>
          </div>
        </div>
      </div>
    </main>

    <!-- VIEW 3: MENU -->
    <main id="view-menu" class="view">
      <div class="menu-view-layout">
        <div class="menu-view-header">
          <div>
            <h2>Wedding Menu</h2>
            <div class="menu-view-meta">
              Taj Gateway Nashik &middot; 23 April 2026
            </div>
          </div>
          <div class="menu-view-actions">
            <button
              class="btn-settings"
              id="btn-settings"
              title="Slot Settings"
            >
              &#9881;
            </button>
            <button class="btn-copy" id="btn-copy-text">Copy as Text</button>
            <button class="btn-print" id="btn-print-menu">
              Print / Save PDF
            </button>
          </div>
        </div>
        <div class="summary-stats" id="summary-stats"></div>
        <div class="menu-table-wrapper" id="menu-table-wrapper"></div>
        <div class="add-row-section" id="add-row-section">
          <button class="btn-add-row" id="btn-add-row">+ Add Row</button>
          <div class="add-row-dropdown" id="add-row-dropdown"></div>
        </div>
        <div class="repetition-report" id="repetition-report"></div>
      </div>
    </main>

    <!-- DISH POPOVER -->
    <div class="dish-popover" id="dish-popover">
      <div class="popover-header">
        <span class="popover-dish-name" id="popover-dish-name"></span>
        <button class="popover-close" id="popover-close">&times;</button>
      </div>
      <div class="popover-events" id="popover-events"></div>
      <div class="popover-details" id="popover-details"></div>
    </div>

    <!-- KEYBOARD HELP -->
    <div class="modal-overlay" id="help-overlay">
      <div class="modal" id="help-modal">
        <div class="modal-header">
          <h3>Keyboard Shortcuts</h3>
          <button class="modal-close" id="help-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="shortcut-row"><kbd>/</kbd> Focus search</div>
          <div class="shortcut-row"><kbd>1</kbd> Dish Browser</div>
          <div class="shortcut-row"><kbd>2</kbd> Event Planner</div>
          <div class="shortcut-row"><kbd>3</kbd> Menu</div>
          <div class="shortcut-row"><kbd>?</kbd> This help</div>
          <div class="shortcut-row"><kbd>Esc</kbd> Close modal</div>
        </div>
      </div>
    </div>

    <!-- FAB: NEW DISH -->
    <button class="fab-new-dish" id="fab-new-dish">+ New Dish</button>

    <!-- CUSTOM DISH MODAL -->
    <div class="modal-overlay" id="custom-dish-overlay">
      <div class="modal" id="custom-dish-modal">
        <div class="modal-header">
          <h3>Add Custom Dish</h3>
          <button class="modal-close" id="custom-dish-close">&times;</button>
        </div>
        <div class="modal-body">
          <form id="custom-dish-form">
            <div class="form-group">
              <label for="custom-dish-name">Dish Name</label>
              <input
                type="text"
                id="custom-dish-name"
                required
                placeholder="e.g. Paneer Lababdar"
                autocomplete="off"
              />
            </div>
            <div class="form-group">
              <label for="custom-dish-category">Category</label>
              <select id="custom-dish-category" required>
                <option value="snack">Snack</option>
                <option value="chaat">Chaat</option>
                <option value="soup">Soup</option>
                <option value="salad">Salad</option>
                <option value="main_course">Main Course</option>
                <option value="dal">Dal</option>
                <option value="vegetable">Vegetable</option>
                <option value="rice">Rice</option>
                <option value="bread">Bread</option>
                <option value="dessert">Dessert</option>
                <option value="beverage">Beverage</option>
                <option value="live_station">Live Station</option>
                <option value="hi_tea">Hi-Tea</option>
                <option value="accompaniment">Accompaniment</option>
              </select>
            </div>
            <button type="submit" class="btn-create-dish">Create Dish</button>
          </form>
        </div>
      </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settings-overlay">
      <div class="modal" id="settings-modal">
        <div class="modal-header">
          <h3>Slot Settings</h3>
          <button class="modal-close" id="settings-close">&times;</button>
        </div>
        <div class="modal-body" id="settings-body"></div>
      </div>
    </div>

    <!-- CELL SEARCH POPOVER -->
    <div class="cell-search-popover" id="cell-search-popover">
      <input
        type="text"
        class="cell-search-input"
        id="cell-search-input"
        placeholder="Search dishes..."
        autocomplete="off"
      />
      <div class="cell-search-results" id="cell-search-results"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
